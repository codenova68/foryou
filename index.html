<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday Buddy 💚</title>
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script&display=swap" rel="stylesheet">

<style>
/* ===== Body & Background ===== */
body {
    margin: 0;
    padding: 0;
    height: 100vh;
    background: #b6f2a1; /* light green */
    font-family: 'Dancing Script', cursive;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    position: relative;
}

/* ===== Glass Card ===== */
.card {
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(15px);
    border-radius: 20px;
    padding: 30px;
    text-align: center;
    box-shadow: 0 0 40px rgba(0,255,150,0.4);
    color: black;
    transition: transform 0.5s;
}

/* ===== Bouncing Letters ===== */
.text { font-size: 35px; letter-spacing: 6px; }
.box {
    display: inline-block;
    border-radius: 8px;
    padding: 10px;
    margin: 4px;
    background: rgba(255,255,255,0.15);
    box-shadow: 0 0 10px #ffffff55;
    animation: bounce 1s infinite alternate;
    cursor: default;
    font-weight: 600;
}

/* ===== Top Line Glow & Bigger ===== */
.top-letter {
    font-weight: 800;
    font-size: 45px;
    text-shadow: 
        0 0 5px #fff,
        0 0 10px #ff0000,
        0 0 15px #ff4500,
        0 0 20px #ffd700,
        0 0 25px #00ff00,
        0 0 30px #1e90ff,
        0 0 35px #8b008b;
}

@keyframes bounce { 0% { transform: translateY(0); } 100% { transform: translateY(-12px); } }

/* ===== Message ===== */
#message { display: block; margin-top: 20px; font-size: 20px; color:black; }

/* ===== Floating Hearts ===== */
.heart {
    position: absolute;
    pointer-events: none;
    animation: floatUpSmooth 6s linear infinite;
}

@keyframes floatUpSmooth {
    0% { transform: translateY(0); }
    100% { transform: translateY(-110vh); }
}

/* ===== Stars ===== */
.star {
    position: absolute;
    width: 2px;
    height: 2px;
    background: white;
    border-radius: 50%;
    opacity: 0.8;
    animation: twinkle 2s infinite alternate;
}

@keyframes twinkle {
    0% { opacity:0.2; transform: scale(0.5); }
    50% { opacity:1; transform: scale(1.5); }
    100% { opacity:0.2; transform: scale(0.5); }
}

/* ===== Mini Hearts Explosion ===== */
.explode-heart { position: absolute; animation: explode 1s ease-out forwards; font-size: 16px; }
@keyframes explode { 0% { transform: translate(0,0) scale(1); opacity:1; } 100% { transform: translate(var(--x), var(--y)) scale(0.5); opacity:0; } }

/* ===== Cake ===== */
.cake {
    font-size: 60px;
    margin-top: 20px;
    animation: popCake 2s ease infinite alternate;
}
@keyframes popCake {
    0% { transform: scale(1); }
    100% { transform: scale(1.2) rotate(5deg); }
}

/* ===== Handwriting Bottom BUDDY ===== */
.handwriting {
    font-family: 'Dancing Script', cursive;
    color: black;
    font-size: 35px;
    letter-spacing: 8px;
    margin-top: 15px;
    display: inline-block;
    animation: bounce 1s infinite alternate;
}
</style>
</head>

<body>

<div class="card" id="card">
<div class="text" id="text">

    <!-- Top Line Rainbow -->
    <span class="box top-letter" style="color:#8B0000;">H</span>
    <span class="box top-letter" style="color:#FF4500;">A</span>
    <span class="box top-letter" style="color:#FFD700;">P</span>
    <span class="box top-letter" style="color:#006400;">P</span>
    <span class="box top-letter" style="color:#1E90FF;">I</span>
    <span class="box top-letter" style="color:#4B0082;">E</span>
    <span class="box top-letter" style="color:#8B008B;">S</span>
    <span class="box top-letter" style="color:#FF1493;">T</span>

    <span class="box top-letter" style="color:#8B0000;">B</span>
    <span class="box top-letter" style="color:#FF4500;">I</span>
    <span class="box top-letter" style="color:#FFD700;">R</span>
    <span class="box top-letter" style="color:#006400;">T</span>
    <span class="box top-letter" style="color:#1E90FF;">H</span>
    <span class="box top-letter" style="color:#4B0082;">D</span>
    <span class="box top-letter" style="color:#8B008B;">A</span>
    <span class="box top-letter" style="color:#FF1493;">Y</span>

    <span class="box top-letter" style="color:#8B0000;">B</span>
    <span class="box top-letter" style="color:#FF4500;">U</span>
    <span class="box top-letter" style="color:#FFD700;">D</span>
    <span class="box top-letter" style="color:#006400;">D</span>
    <span class="box top-letter" style="color:#1E90FF;">Y</span><br>

</div>

<div id="message">
    💚 Dear Buddy 💚<br><br>
    Thank you for being always with me in my every gud and worst situations 💕<br>
    You're such a great person ever I meet🙌🏽<br>
    You mean a lot to me 😊<br>
    Stay happy and keep smiling always 💫<br><br>
    THANK YOU SOOO MUCH BRO✌🏽<br>
    💌 From Reshma 💌
</div>

<div class="cake">🎂</div>

<script>
const colors = ["#ff0000","#ff7f00","#ffff00","#00ff00","#0000ff","#4b0082","#8b00ff"];

// Floating Hearts
function createHeart() {
    if(document.querySelectorAll('.heart').length>30) return;
    const heart=document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML="💚";
    heart.style.left=Math.random()*100+"vw";
    heart.style.fontSize=Math.random()*20+15+"px";
    heart.style.color=colors[Math.floor(Math.random()*colors.length)];
    document.body.appendChild(heart);
}
setInterval(createHeart,300);
// Stars - more shiny and frequent
function createStar(){
    const star=document.createElement("div");
    star.classList.add("star");
    star.style.left=Math.random()*100+"vw";
    star.style.top=Math.random()*100+"vh";
    
    // bigger + random size for shine effect
    const size = Math.random()*3 + 1;
    star.style.width = size+"px";
    star.style.height = size+"px";
    
    // brighter opacity randomly
    star.style.opacity = 0.5 + Math.random()*0.5;
    
    document.body.appendChild(star);
    
    // twinkle duration random for extra sparkle
    star.style.animationDuration = (1 + Math.random()*1.5) + "s";
    
    setTimeout(()=>star.remove(),5000); // slightly longer lifetime
}
setInterval(createStar,100); // create every 0.1 sec → more stars


// Exploding Letters
function explodeLetters(){
    const letters=document.querySelectorAll(".box");
    letters.forEach(letter=>{
        const rect=letter.getBoundingClientRect();
        for(let i=0;i<5;i++){
            const heart=document.createElement("div");
            heart.classList.add("explode-heart");
            heart.innerHTML="💚";
            heart.style.left=rect.left+rect.width/2+"px";
            heart.style.top=rect.top+rect.height/2+"px";
            const x=(Math.random()-0.5)*200+"px";
            const y=(Math.random()-0.5)*200+"px";
            heart.style.setProperty('--x',x);
            heart.style.setProperty('--y',y);
            document.body.appendChild(heart);
            setTimeout(()=>heart.remove(),1000);
        }
    });
}

// Fireworks
function fireworks(){
    for(let i=0;i<20;i++){
        const fire=document.createElement("div");
        fire.innerHTML="✨";
        fire.style.position="absolute";
        fire.style.left=Math.random()*100+"vw";
        fire.style.top=Math.random()*100+"vh";
        fire.style.fontSize="20px";
        document.body.appendChild(fire);
        setTimeout(()=>fire.remove(),1000);
    }
}
setInterval(fireworks,5000);

// Run explode letters after page load
window.addEventListener('load', () => {
    document.getElementById("card").classList.add("show");
    explodeLetters();
});
</script>

</body>
</html>
