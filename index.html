<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday Buddy 💚</title>

<style>
body {
    margin: 0;
    padding: 0;
    height: 100vh;
    background: linear-gradient(135deg, #1d976c, #93f9b9);
    font-family: 'Poppins', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
}

/* Glass Card */
.card {
    background: rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(15px);
    border-radius: 20px;
    padding: 30px;
    text-align: center;
    box-shadow: 0 0 40px rgba(0,255,150,0.4);
    color: white;
}

/* Block Text */
.text {
    font-size: 35px;
    letter-spacing: 6px;
}

.box {
    display: inline-block;
    border: 2px solid white;
    padding: 10px;
    margin: 4px;
    border-radius: 8px;
    background: rgba(255,255,255,0.15);
    box-shadow: 0 0 10px #00ff99;
}

/* Button */
button {
    margin-top: 20px;
    padding: 12px 25px;
    border: none;
    border-radius: 8px;
    background: white;
    color: #1d976c;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.1);
}

/* Message */
#message {
    display: none;
    margin-top: 20px;
    font-size: 20px;
    animation: fadeIn 2s;
}

@keyframes fadeIn {
    from {opacity: 0;}
    to {opacity: 1;}
}

/* Floating hearts */
.heart {
    position: absolute;
    color: #00ffcc;
    animation: float 6s linear infinite;
}

@keyframes float {
    0% { transform: translateY(100vh); opacity: 0; }
    50% { opacity: 1; }
    100% { transform: translateY(-10vh); opacity: 0; }
}
</style>
</head>

<body>

<div class="card">

<div class="text">
    <span class="box">H</span>
    <span class="box">A</span>
    <span class="box">P</span>
    <span class="box">P</span>
    <span class="box">I</span>
    <span class="box">E</span>
    <span class="box">S</span>
    <span class="box">T</span><br>

    <span class="box">B</span>
    <span class="box">I</span>
    <span class="box">R</span>
    <span class="box">T</span>
    <span class="box">H</span>
    <span class="box">D</span>
    <span class="box">A</span>
    <span class="box">Y</span><br>

    <span class="box">B</span>
    <span class="box">U</span>
    <span class="box">D</span>
    <span class="box">D</span>
    <span class="box">Y</span>
</div>

<button onclick="showMessage()">Tap for Surprise 💚</button>

<div id="message">
    💚 Dear Buddy 💚<br><br>
    Thank you for being always with me 💕<br>
    You mean a lot to me 😊<br>
    Stay happy and keep smiling always 💫<br><br>
    💌 From Reshma 💌
</div>

</div>

<script>
function showMessage() {
    document.getElementById("message").style.display = "block";
}

function createHeart() {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "💚";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = Math.random() * 15 + 15 + "px";
    document.body.appendChild(heart);

    setTimeout(() => {
        heart.remove();
    }, 6000);
}

setInterval(createHeart, 250);
</script>

</body>
</html>
