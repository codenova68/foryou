<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday Buddy 💚</title>

<style>
/* ===== Body & Background ===== */
body {
    margin: 0;
    padding: 0;
    height: 100vh;
    background: #b6f2a1; /* Fav green */
    font-family: 'Dancing Script', cursive;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    position: relative;
}

/* ===== Glass Card ===== */
.card {
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(15px);
    border-radius: 20px;
    padding: 30px;
    text-align: center;
    box-shadow: 0 0 40px rgba(0,255,150,0.4);
    color: black;
    transition: transform 0.5s;
}

/* ===== Bouncing Letters ===== */
.text { font-size: 35px; letter-spacing: 6px; }
.box {
    display: inline-block;
    border-radius: 8px;
    padding: 10px;
    margin: 4px;
    background: rgba(255,255,255,0.15);
    box-shadow: 0 0 10px #ffffff55;
    animation: bounce 1s infinite alternate;
    cursor: default;
    font-weight: 600;
}

/* ===== Top Line Glow & Bigger ===== */
.top-letter {
    font-weight: 800;
    font-size: 45px;
    text-shadow: 
        0 0 5px #fff,
        0 0 10px #ff0000,
        0 0 15px #ff4500,
        0 0 20px #ffd700,
        0 0 25px #00ff00,
        0 0 30px #1e90ff,
        0 0 35px #8b008b;
}

@keyframes bounce { 0% { transform: translateY(0); } 100% { transform: translateY(-12px); } }

/* ===== Button ===== */
button {
    margin-top: 20px;
    padding: 12px 25px;
    border: none;
    border-radius: 8px;
    background: white;
    color: #2e7d32;
    font-size: 18px;
    cursor: pointer;
    transition: 0.3s;
    font-family: 'Dancing Script', cursive;
}
button:hover { transform: scale(1.1); }

#message { display: none; margin-top: 20px; font-size: 20px; animation: fadeIn 2s; color:black; }
.card.show { transform: scale(1.1); }
@keyframes fadeIn { from {opacity:0;} to {opacity:1;} }

/* ===== Floating Hearts ===== */
.heart {
    position: absolute;
    pointer-events: none;
    animation: floatUp 6s linear infinite, pulse 1.5s ease-in-out infinite alternate;
}

/* ===== Stars ===== */
.star {
    position: absolute;
    width: 2px;
    height: 2px;
    background: white;
    border-radius: 50%;
    opacity: 0.8;
    animation: twinkle 2s infinite alternate;
}

/* ===== Floating Hearts Animation ===== */
@keyframes floatUp {
    0% { transform: translateY(0) rotate(0deg); }
    100% { transform: translateY(-110vh) rotate(360deg); }
}
@keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.3); }
    100% { transform: scale(1); }
}

/* ===== Stars Animation ===== */
@keyframes twinkle { from {opacity:0.2; transform: scale(0.5);} to {opacity:1; transform: scale(1.5);} }

/* ===== Mini Hearts Explosion ===== */
.explode-heart { position: absolute; animation: explode 1s ease-out forwards; font-size: 16px; }
@keyframes explode { 0% { transform: translate(0,0) scale(1); opacity:1; } 100% { transform: translate(var(--x), var(--y)) scale(0.5); opacity:0; } }
</style>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script&display=swap" rel="stylesheet">
</head>

<body>

<div class="card" id="card">
<div class="text" id="text">

    <!-- Top Line HAPPIEST BIRTHDAY BUDDY Dark Rainbow -->
    <span class="box top-letter" style="color:#8B0000;">H</span>
    <span class="box top-letter" style="color:#FF4500;">A</span>
    <span class="box top-letter" style="color:#FFD700;">P</span>
    <span class="box top-letter" style="color:#006400;">P</span>
    <span class="box top-letter" style="color:#1E90FF;">I</span>
    <span class="box top-letter" style="color:#4B0082;">E</span>
    <span class="box top-letter" style="color:#8B008B;">S</span>
    <span class="box top-letter" style="color:#FF1493;">T</span>

    <span class="box top-letter" style="color:#8B0000;">B</span>
    <span class="box top-letter" style="color:#FF4500;">I</span>
    <span class="box top-letter" style="color:#FFD700;">R</span>
    <span class="box top-letter" style="color:#006400;">T</span>
    <span class="box top-letter" style="color:#1E90FF;">H</span>
    <span class="box top-letter" style="color:#4B0082;">D</span>
    <span class="box top-letter" style="color:#8B008B;">A</span>
    <span class="box top-letter" style="color:#FF1493;">Y</span>

    <span class="box top-letter" style="color:#8B0000;">B</span>
    <span class="box top-letter" style="color:#FF4500;">U</span>
    <span class="box top-letter" style="color:#FFD700;">D</span>
    <span class="box top-letter" style="color:#006400;">D</span>
    <span class="box top-letter" style="color:#1E90FF;">Y</span><br>

    <!-- Bottom Line in Black -->
    <span class="box" style="color:black;">B</span>
    <span class="box" style="color:black;">U</span>
    <span class="box" style="color:black;">D</span>
    <span class="box" style="color:black;">D</span>
    <span class="box" style="color:black;">Y</span>
</div>

<div id="message">
    💚 Dear Buddy 💚<br><br>
    Thank you for being always with me in my every gud and worst situations 💕<br>
    You mean a lot to me 😊<br>
You are a great person ever I meet🙌🏽<br>
    Stay happy and keep smiling always 💫<br><br>
    💌 From Reshma 💌
</div>

<audio id="music" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>
</div>

<script>
const colors = ["#ff0000","#ff7f00","#ffff00","#00ff00","#0000ff","#4b0082","#8b00ff"];

// Show message + explode letters automatically after page load
window.addEventListener('load', () => {
    document.getElementById("message").style.display = "block";
    document.getElementById("card").classList.add("show");
    explodeLetters();

    // Play music automatically
    const audio = document.getElementById("music");
    audio.muted = true; // start muted to bypass autoplay block
    audio.play().then(() => {
        audio.muted = false; // unmute after play starts
        audio.volume = 0.5;
    }).catch(err => console.log("Autoplay blocked", err));

    syncHeartsWithBeat(audio);
});

// Floating Hearts
function createHeart() {

    position: absolute;
    pointer-events: none;
    animation: floatUpSmooth 6s linear infinite;
}

@keyframes floatUpSmooth {
    0% { transform: translateY(0); }
    100% { transform: translateY(-110vh); }
        }
setInterval(createHeart,300);
function createHeart() {
    if(document.querySelectorAll('.heart').length>30) return;
    const heart=document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML="💚";
    heart.style.left=Math.random()*100+"vw";
    heart.style.fontSize=Math.random()*20+15+"px";
    heart.style.color=colors[Math.floor(Math.random()*colors.length)];
    document.body.appendChild(heart);
}
setInterval(createHeart,300);
// Stars
function createStar(){
    const star=document.createElement("div");
    star.classList.add("star");
    star.style.left=Math.random()*100+"vw";
    star.style.top=Math.random()*100+"vh";
    star.style.width=Math.random()*3+1+"px";
    star.style.height=star.style.width;
    document.body.appendChild(star);
    setTimeout(()=>star.remove(),4000);
}
setInterval(createStar,200);

// Exploding Letters into Mini Hearts
function explodeLetters(){
    const letters=document.querySelectorAll(".box");
    letters.forEach(letter=>{
        const rect=letter.getBoundingClientRect();
        for(let i=0;i<5;i++){
            const heart=document.createElement("div");
            heart.classList.add("explode-heart");
            heart.innerHTML="💚";
            heart.style.left=rect.left+rect.width/2+"px";
            heart.style.top=rect.top+rect.height/2+"px";
            const x=(Math.random()-0.5)*200+"px";
            const y=(Math.random()-0.5)*200+"px";
            heart.style.setProperty('--x',x);
            heart.style.setProperty('--y',y);
            document.body.appendChild(heart);
            setTimeout(()=>heart.remove(),1000);
        }
    });
}

// Hearts Bounce With Music Beat
function syncHeartsWithBeat(audio){
    const context = new (window.AudioContext || window.webkitAudioContext)();
    const src = context.createMediaElementSource(audio);
    const analyser = context.createAnalyser();
    src.connect(analyser);
    analyser.connect(context.destination);
    analyser.fftSize = 256;
    const bufferLength = analyser.frequencyBinCount;
    const dataArray = new Uint8Array(bufferLength);

    function animate(){
        requestAnimationFrame(animate);
        analyser.getByteFrequencyData(dataArray);
        const avg = dataArray.reduce((a,b)=>a+b)/dataArray.length;
        const scale = 0.5 + avg/256; 
        document.querySelectorAll(".heart").forEach(h=>{
            h.style.transform = `scale(${scale})`;
        });
    }
    animate();
}
</script>

</body>
</html>
